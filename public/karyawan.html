<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absen Sales Lapangan</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">
    <div id="loginSection" class="max-w-sm mx-auto mt-16 p-6 bg-white rounded-lg shadow-md mx-4 border border-gray-200">
        <h2 class="text-xl font-bold mb-1 text-center text-indigo-700">Aplikasi Sales Lapangan</h2>
        <p class="text-xs text-gray-500 text-center mb-5">Gunakan akun sales harian Anda</p>
        <input type="text" id="username" placeholder="Username (Isi: sales1)" class="w-full p-2.5 mb-3 border rounded focus:ring-2 focus:ring-indigo-400 outline-none text-sm">
        <input type="password" id="password" placeholder="Password (Isi: salespassword)" class="w-full p-2.5 mb-5 border rounded focus:ring-2 focus:ring-indigo-400 outline-none text-sm">
        <button onclick="login()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold p-2.5 rounded shadow">Masuk Kerja</button>
    </div>

    <div id="appSection" class="hidden max-w-md mx-auto p-4">
        <div class="bg-white p-4 rounded-lg shadow mb-4 flex justify-between items-center border border-gray-200">
            <div>
                <p class="text-[10px] text-gray-400 uppercase font-bold tracking-wider">Karyawan Lapangan</p>
                <h3 id="salesName" class="text-md font-bold text-indigo-700">-</h3>
            </div>
            <button onclick="logout()" class="text-xs text-red-500 font-semibold border border-red-300 px-3 py-1 rounded bg-red-50 hover:bg-red-100">Logout</button>
        </div>

        <h4 class="font-bold text-gray-600 mb-2 text-xs uppercase tracking-wide">Pilih Toko Yang Dikunjungi:</h4>
        <div id="warungListContainer" class="space-y-2 mb-6">
            </div>

        <div id="validationPanel" class="hidden bg-white p-5 rounded-lg shadow-md border-2 border-indigo-600">
            <h3 class="font-bold text-gray-800 text-sm border-b pb-2 mb-3">Formulir Validasi Kehadiran Fisik</h3>
            <p class="text-xs text-gray-600 mb-4">Toko Target: <span id="targetWarungName" class="font-extrabold text-gray-900"></span></p>
            
            <div class="mb-4">
                <button onclick="getLocation()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-xs py-2.5 px-4 rounded w-full shadow">
                    Langkah 1: Kunci Posisi GPS HP Anda
                </button>
                <p id="gpsStatus" class="text-xs text-center text-amber-600 mt-1.5 font-mono font-medium">GPS: Belum diverifikasi</p>
            </div>

            <div class="mb-5">
                <label class="block text-xs font-bold text-gray-700 mb-1">Langkah 2: Input / Scan Token QR Toko</label>
                <input type="text" id="qrTokenInput" placeholder="Masukkan Token QR Stiker Toko" class="w-full p-2 border-2 border-gray-300 rounded text-sm font-mono uppercase bg-gray-50 focus:border-indigo-500 outline-none">
            </div>

            <button onclick="submitCheckIn()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded shadow-md text-sm transition">
                Kirim Pembuktian Kehadiran
            </button>
        </div>
    </div>

    <script>
        let user = null, selectedWarungId = null;
        let latitudeSales = null, longitudeSales = null;

        function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p})
            })
            .then(res => res.json())
            .then(data => {
                if(data.success && data.user.role === 'SALES') {
                    user = data.user;
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('appSection').classList.remove('hidden');
                    document.getElementById('salesName').innerText = user.name;
                    loadWarungTargets();
                } else {
                    alert("Gagal Masuk! Hanya akun Sales yang diizinkan mengakses halaman HP ini.");
                }
            });
        }

        function logout() { location.reload(); }

        function loadWarungTargets() {
            fetch('/api/karyawan/warung')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('warungListContainer');
                container.innerHTML = '';
                data.forEach(w => {
                    container.innerHTML += `<div onclick="selectWarung('${w.id}', '${w.name}')" class="bg-white p-3.5 rounded-lg border border-gray-200 hover:border-indigo-400 shadow-sm cursor-pointer transition">
                        <p class="font-bold text-sm text-gray-900">${w.name}</p>
                        <p class="text-xs text-gray-500">Pemilik: ${w.owner}</p>
                    </div>`;
                });
            });
        }

        function selectWarung(id, name) {
            selectedWarungId = id;
            document.getElementById('targetWarungName').innerText = name;
            document.getElementById('validationPanel').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function getLocation() {
            const txt = document.getElementById('gpsStatus');
            if (!navigator.geolocation) {
                txt.innerText = "HP Anda tidak mendukung sensor lokasi.";
                return;
            }
            txt.innerText = "Menghubungkan ke satelit GPS...";
            navigator.geolocation.getCurrentPosition((pos) => {
                latitudeSales = pos.coords.latitude;
                longitudeSales = pos.coords.longitude;
                txt.innerText = `GPS OK! Terkunci di: ${latitudeSales.toFixed(5)}, ${longitudeSales.toFixed(5)}`;
                txt.className = "text-xs text-center text-green-600 mt-1.5 font-mono font-medium";
            }, () => {
                txt.innerText = "Gagal Mengunci Lokasi. Aktifkan Fitur GPS/Lokasi di HP Anda!";
                txt.className = "text-xs text-center text-red-600 mt-1.5 font-mono font-medium";
            }, { enableHighAccuracy: true });
        }

        function submitCheckIn() {
            if (!latitudeSales) return alert("Kunci GPS Anda terlebih dahulu (Klik Langkah 1)!");
            const token = document.getElementById('qrTokenInput').value.trim();
            if (!token) return alert("Isi / Scan Token QR Code stiker terlebih dahulu!");

            fetch('/api/karyawan/checkin', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    userId: user.id, userName: user.name,
                    warungId: selectedWarungId,
                    salesLat: latitudeSales, salesLng: longitudeSales,
                    scannedToken: token
                })
            })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                if(data.success) {
                    document.getElementById('validationPanel').classList.add('hidden');
                    document.getElementById('qrTokenInput').value = '';
                    document.getElementById('gpsStatus').innerText = "GPS: Belum diverifikasi";
                    document.getElementById('gpsStatus').className = "text-xs text-center text-amber-600 mt-1.5 font-mono font-medium";
                    latitudeSales = null; longitudeSales = null;
                }
            });
        }
    </script>
</body>
</html>
